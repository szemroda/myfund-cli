name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump"
        required: true
        type: choice
        default: minor
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run verify

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump package version
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ ! "$VERSION_INPUT" =~ ^(patch|minor|major)$ ]]; then
            echo "Invalid version input: $VERSION_INPUT" >&2
            exit 1
          fi

          npm version "$VERSION_INPUT" --no-git-tag-version
          NEXT_VERSION="$(node -p "require('./package.json').version")"
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release notes from commits
        id: notes
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          PREVIOUS_TAG="$(git describe --tags --match 'v[0-9]*' --abbrev=0 2>/dev/null || true)"
          {
            echo "# $TAG"
            echo
            if [[ -n "$PREVIOUS_TAG" ]]; then
              echo "Changes since $PREVIOUS_TAG:"
              echo
              git log "$PREVIOUS_TAG"..HEAD --no-merges --pretty=format:'- %s (%h)' | sed '/^$/d'
            else
              echo "Initial release. Changes included:"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' | sed '/^$/d'
            fi
            echo
          } > release-notes.md

      - name: Commit version bump
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No version file changes to commit."
          else
            git commit -m "chore: release $TAG"
          fi

      - name: Build package artifact
        id: pack
        run: |
          set -euo pipefail

          PACKAGE_FILE="$(npm pack --json | node -e "let data='';process.stdin.on('data',c=>data+=c);process.stdin.on('end',()=>process.stdout.write(JSON.parse(data)[0].filename));")"
          echo "file=$PACKAGE_FILE" >> "$GITHUB_OUTPUT"

      - name: Create tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists." >&2
            exit 1
          fi

          git tag "$TAG"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
          PACKAGE_FILE: ${{ steps.pack.outputs.file }}
        run: |
          set -euo pipefail

          ARGS=()
          if [[ "$PRERELEASE" == "true" ]]; then
            ARGS+=(--prerelease)
          fi

          gh release create "$TAG" "$PACKAGE_FILE" \
            --title "$TAG" \
            --notes-file release-notes.md \
            "${ARGS[@]}"

  publish-npm:
    needs: release
    if: ${{ !inputs.prerelease }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - run: npm ci
      - run: npm publish
